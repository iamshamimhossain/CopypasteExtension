<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Tab Link Copier</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <div class="brand-icon">🔗</div>
        <div>
          <h1>Tab Link Copier</h1>
          <p class="subtitle" id="tabCountLabel">Loading tabs…</p>
        </div>
      </div>
      <nav class="segmented" role="tablist">
        <button class="seg-btn active" data-panel="copy" role="tab">Copy tabs</button>
        <button class="seg-btn" data-panel="open" role="tab">Open URLs</button>
        <button class="seg-btn" data-panel="saved" role="tab">Saved</button>
      </nav>
    </header>

    <!-- ================= COPY PANEL ================= -->
    <section class="panel" id="panel-copy">
      <div class="toolbar">
        <div class="search-wrap">
          <input type="text" id="searchInput" placeholder="Filter tabs by title or URL… (press /)" />
        </div>
        <select id="domainFilter" title="Filter by domain">
          <option value="">All domains</option>
        </select>
        <button id="selectAllBtn" class="ghost-btn">Select all</button>
      </div>

      <div class="tab-list" id="tabList">
        <!-- populated by popup.js -->
      </div>

      <footer class="panel-footer">
        <div class="format-row">
          <label for="formatSelect">Format</label>
          <select id="formatSelect">
            <option value="plain">Plain URLs (one per line)</option>
            <option value="titled">Title + URL</option>
            <option value="markdown">Markdown links</option>
            <option value="html">HTML links</option>
            <option value="json">JSON array</option>
          </select>
        </div>
        <div class="footer-actions">
          <button id="saveListBtn" class="ghost-btn">Save as list</button>
          <button id="copyBtn" class="primary-btn">
            <span id="copyBtnText">Copy 0 links</span>
          </button>
        </div>
        <button id="shortcutsLink" class="shortcuts-link">⌨ Ctrl+Shift+Y copies all tabs instantly — customize shortcuts</button>
      </footer>
    </section>

    <!-- ================= OPEN PANEL ================= -->
    <section class="panel hidden" id="panel-open">
      <p class="hint">Paste one URL per line. Missing "https://" will be added automatically.</p>
      <textarea id="urlInput" placeholder="https://example.com/page-one&#10;https://example.com/page-two"></textarea>
      <div class="open-footer">
        <span id="urlCountLabel" class="muted">0 URLs</span>
        <div class="open-actions">
          <button id="pasteBtn" class="ghost-btn">Paste from clipboard</button>
          <button id="openBtn" class="primary-btn">Open all tabs</button>
        </div>
      </div>
    </section>

    <!-- ================= SAVED LISTS PANEL ================= -->
    <section class="panel hidden" id="panel-saved">
      <p class="hint">Saved lists sync across your devices when you're signed into Chrome (large lists fall back to this device only).</p>
      <div class="saved-list" id="savedList">
        <!-- populated by popup.js -->
      </div>
    </section>

    <div class="toast" id="toast"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
